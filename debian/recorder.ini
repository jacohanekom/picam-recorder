# /etc/picam-recorder/recorder.ini
#
# raw_port/raw_width/raw_height default from the shared
# /etc/aipicam/streams.conf (aipicam-config package) — picam-raw's wire
# protocol carries no width/height field, so this file's own copy
# previously risked silently drifting from what picam-raw actually
# sends. Uncomment below to explicitly override the shared file for
# local debugging.

raw_host   = 127.0.0.1
# raw_port   = 8560
# raw_width  = 2304
# raw_height = 1296
raw_fps    = 30
# raw_stride = 0   # 0 = same as raw_width (picam-raw always sends tightly-packed rows now, so this should never need to be set)

dir  = /var/lib/picam-recorder
port = 8080
pre  = 10
post = 10
